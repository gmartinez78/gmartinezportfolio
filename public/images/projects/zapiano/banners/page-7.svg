  <text x="118" y="188" fill="#0E2951" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">EINFÜHRUNGSKURS</text>
  <text x="118" y="272" fill="#0E2951" font-family="Georgia, serif" font-size="58" font-style="italic">Klavier lernen mit</text>
  <text x="118" y="338" fill="#0E2951" font-family="Georgia, serif" font-size="58" font-style="italic">Struktur statt Lärm.</text>
  <text x="118" y="390" fill="#5C7792" font-family="Arial, sans-serif" font-size="22">Ein klarer €9-Einstieg für Erwachsene, ob Anfänger oder Wiedereinsteiger,</text>
  <text x="118" y="422" fill="#5C7792" font-family="Arial, sans-serif" font-size="22">geführt von Sven Haefliger und reduziert auf einen klaren nächsten Schritt.</text>
  <rect x="118" y="470" width="220" height="58" rx="29" fill="#1183D0"/>
  <text x="164" y="506" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="700">Jetzt für €9 starten</text>
  <rect x="356" y="470" width="190" height="58" rx="29" fill="white" stroke="#BFD4E7"/>
  <text x="395" y="506" fill="#0E2951" font-family="Arial, sans-serif" font-size="22" font-weight="700">Kurs ansehen</text>
  <rect x="118" y="560" width="250" height="42" rx="21" fill="white" fill-opacity="0.78"/>
  <text x="142" y="586" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">4.9★ von erwachsenen Lernenden</text>

  <text x="96" y="712" fill="#0E2951" font-family="Georgia, serif" font-size="40" font-style="italic">Wähle den Weg, der zu deinem Ziel passt</text>
  <rect x="96" y="760" width="524" height="232" rx="28" fill="#F6FAFD" stroke="#D7E8F7"/>
  <rect x="660" y="760" width="524" height="232" rx="28" fill="#F6FAFD" stroke="#D7E8F7"/>
  <text x="134" y="816" fill="#1183D0" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">FÜR ANFÄNGER</text>
  <text x="134" y="862" fill="#0E2951" font-family="Arial, sans-serif" font-size="34" font-weight="700">Du beginnst bei null</text>
  <text x="134" y="906" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">Klare erste Übungen, kurze tägliche Praxis</text>
  <text x="134" y="936" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">und kleine Erfolgsmomente von Anfang an.</text>
  <rect x="134" y="956" width="164" height="44" rx="22" fill="#E8F4FD"/>
  <text x="160" y="984" fill="#1183D0" font-family="Arial, sans-serif" font-size="18" font-weight="700">Anfängerpfad ansehen</text>
  <text x="698" y="816" fill="#1183D0" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">FÜR WIEDEREINSTEIGER</text>
  <text x="698" y="862" fill="#0E2951" font-family="Arial, sans-serif" font-size="34" font-weight="700">Du kommst zurück ans Klavier</text>
  <text x="698" y="906" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">Technik auffrischen, Routine zurückgewinnen</text>
  <text x="698" y="936" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">und mit strukturierten Lektionen weitergehen.</text>
  <rect x="698" y="956" width="162" height="44" rx="22" fill="#E8F4FD"/>
  <text x="716" y="984" fill="#1183D0" font-family="Arial, sans-serif" font-size="18" font-weight="700">Wiedereinstieg ansehen</text>

  <rect x="96" y="1050" width="1088" height="236" rx="28" fill="#FFF8EC" stroke="#F2DDB1"/>
  <text x="132" y="1110" fill="#8B5E16" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">MIT SVEN HAEFLIGER</text>
  <text x="132" y="1160" fill="#0E2951" font-family="Georgia, serif" font-size="42" font-style="italic">Lerne direkt mit Sven Haefliger</text>
  <text x="132" y="1205" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">Seit über 25 Jahren unterrichtet er Erwachsene mit einer Methode,</text>
  <text x="132" y="1235" fill="#5C7792" font-family="Arial, sans-serif" font-size="20">die auf Fortschritt, Routine und musikalische Tiefe setzt.</text>
  <rect x="912" y="1086" width="218" height="146" rx="24" fill="#F6E3D3"/>
  <circle cx="1021" cy="1140" r="42" fill="#C98E69"/>
  <rect x="964" y="1194" width="116" height="12" rx="6" fill="#D9C6B6"/>

  <text x="96" y="1360" fill="#0E2951" font-family="Georgia, serif" font-size="40" font-style="italic">So sieht das Lernerlebnis aus</text>
  <rect x="96" y="1408" width="1088" height="370" rx="30" fill="#F7FAFC" stroke="#D7E8F7"/>
  <rect x="134" y="1452" width="284" height="286" rx="24" fill="#EAF2FA"/>
