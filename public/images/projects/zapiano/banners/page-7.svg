  <text x="164" y="1680" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">Lektionsvorschau</text>
  <text x="484" y="1680" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">Übungsstruktur</text>
  <text x="808" y="1710" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="700">App + Mitgliederbereich</text>

  <text x="96" y="1850" fill="#0E2951" font-family="Georgia, serif" font-size="40" font-style="italic">Gemeinschaft zuerst, Preis später</text>
  <rect x="96" y="1898" width="1088" height="268" rx="28" fill="#F8FBFF" stroke="#D7E8F7"/>
