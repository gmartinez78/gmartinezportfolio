  <text x="164" y="1990" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">„Ich bin endlich drangeblieben.“</text>
  <text x="164" y="2030" fill="#5C7792" font-family="Arial, sans-serif" font-size="18">Anfängerin, Zürich</text>
  <text x="520" y="1990" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">„Die App macht Fortschritt sichtbar.“</text>
  <text x="520" y="2030" fill="#5C7792" font-family="Arial, sans-serif" font-size="18">Wiedereinsteiger, Hamburg</text>
  <text x="876" y="1990" fill="#0E2951" font-family="Arial, sans-serif" font-size="18" font-weight="700">„Die Struktur war sofort klar.“</text>
  <text x="876" y="2030" fill="#5C7792" font-family="Arial, sans-serif" font-size="18">Erwachsener Lernender, Amsterdam</text>

  <rect x="96" y="2218" width="1088" height="198" rx="28" fill="#0E2951"/>
  <text x="132" y="2290" fill="white" font-family="Georgia, serif" font-size="42" font-style="italic">Ein klarer nächster Schritt</text>
  <text x="132" y="2336" fill="#C4D6E8" font-family="Arial, sans-serif" font-size="20">Jetzt mit dem €9-Einführungskurs starten. PianoStarter erst nach dem ersten Erfolg.</text>
  <rect x="842" y="2272" width="236" height="64" rx="32" fill="#1183D0"/>
  <text x="884" y="2311" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="700">Für €9 starten</text>
  <rect x="108" y="2390" width="220" height="18" rx="9" fill="#264D74"/>

