  <text x="118" y="338" fill="#0E2951" font-family="Georgia, serif" font-size="58" font-style="italic">structure, not noise.</text>
  <text x="118" y="390" fill="#5C7792" font-family="Arial, sans-serif" font-size="22">A €9 first step for adult beginners and returners, guided by</text>
  <text x="118" y="422" fill="#5C7792" font-family="Arial, sans-serif" font-size="22">Sven Haefliger and designed to reduce friction on cold traffic.</text>
